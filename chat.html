<!DOCTYPE html>
<html>
<head>
    <title>Chativo • Messaging</title>
    <link rel="stylesheet" href="css/style.css">

     <link rel="manifest" href="/manifest.json">
     <meta name="theme-color" content="#00a884">     

</head>
<body>

<div class="app">

    <div class="sidebar">

        <h2>Chats</h2>

      <input
    type="text"
    id="searchUser"
    placeholder="Search users..."
>

        <div id="userList">
            No users yet
        </div>

        <button id="themeBtn">🌙 Dark Mode</button>
        <button id="logoutBtn">Logout</button><br>
        <button id="settingsBtn">⚙️ Settings</button>

    </div>

    <div class="chat">
<div class="chat-header">

    <div class="chat-header-left">

      <button id="backBtn">←</button>

        <img id="chatPhoto" src="">

        <div>

            <h2 id="chatName">Select a User</h2>

            <small id="chatStatus">Offline</small><br>

            <small id="typingStatus"></small>

        </div>

    </div>

<input
    type="text"
    id="searchMessage"
    placeholder="Search messages..."
>

    <button id="callBtn">📞</button>

</div>

        <div id="messages"></div>

        <div id="emojiPicker" class="emoji-picker">

<span>😀</span>
<span>😁</span>
<span>😂</span>
<span>🤣</span>
<span>😊</span>
<span>😍</span>
<span>😎</span>
<span>🤔</span>
<span>😢</span>
<span>😭</span>
<span>❤️</span>
<span>👍</span>
<span>👏</span>
<span>🎉</span>
<span>🔥</span>

</div>

      <div id="replyPreview" style="display:none;"></div>

         <div class="chat-input">

    <button id="emojiBtn" title="Emoji">😊</button>
    <input type="file" id="imageInput" accept="image/*" hidden>

<button id="imageBtn">📷</button>
<button id="voiceBtn" title="Voice Message">🎤</button>

    <input
        type="text"
        id="message"
        placeholder="Type a message">

    <button id="sendBtn" title="Send">
        ➤
    </button>

</div>

    </div>

</div>

<script type="module" src="js/sidebar.js"></script>
<script type="module" src="js/chat.js"></script>
<script type="module" src="js/call.js"></script>
<script type="module" src="js/emoji.js"></script>

<div id="callScreen" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
color:white;
z-index:9999;
text-align:center;
">

    <h1 id="callTitle">Calling...</h1>

    <video
        id="localVideo"
        autoplay
        muted
        playsinline
        style="width:300px;border-radius:10px;">
    </video>

    <video
        id="remoteVideo"
        autoplay
        playsinline
        style="width:500px;border-radius:10px;">
    </video>

    <br><br>

    <button id="muteBtn">🎤 Mute</button>

    <button id="cameraBtn">📷 Camera</button>

    <button id="endCallBtn">❌ End Call</button>

</div>

<script type="module" src="js/theme.js"></script>

<div id="messageMenu">
    <button id="editMsg">✏️ Edit</button>
    <button id="replyMsg">↩ Reply</button>
    <button id="reactMsg">😊 React</button>
    <button id="copyMsg">📋 Copy</button>
    <button id="deleteMsg">🗑 Delete</button>
</div>

<div id="toast"></div>

<div id="confirmModal" class="modal">
    <div class="modal-content">
        <h3>Delete Message?</h3>
        <p>This action cannot be undone.</p>

        <div class="modal-actions">
            <button id="cancelDelete">Cancel</button>
            <button id="confirmDelete">Delete</button>
        </div>
    </div>
</div>

</body>
</html>
